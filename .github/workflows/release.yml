name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (compiles to release 8 bytecode)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build agent jar
        run: ./build.sh

      - name: Compute SHA-1 (pin this in the launcher)
        id: sha
        run: |
          SHA1=$(sha1sum infinity-guard-1.1.0.jar | awk '{print $1}')
          echo "sha1=$SHA1" >> "$GITHUB_OUTPUT"
          echo "::notice title=Jar SHA-1::$SHA1 — pin GUARD_AGENT_SHA1 to this"

      - name: Create release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: infinity-guard-1.1.0.jar
          body: |
            Pack whitelist enforcement + server attestation heartbeat.

            SHA-1: `${{ steps.sha.outputs.sha1 }}`
